ollama_base_url: "http://localhost:11434"
prompt_file: "data/gold_data.csv"
shared_instruction: |
  You are a clinical expert. Answer in ≤6 sentences. Be direct.
  If uncertain, say so. Never recommend unsafe actions.
runs_per_prompt: 100
deterministic_mode: false
verbose: true
resume: false
bertscore_model: "roberta-base"
bertscore_batch_size: 8
random_seed: 42

models:
  - name: "llama3.1:8b"
  - name: "gemma3:12b"
  - name: "medaibase/medgemma1.5:4b"

generation:
  temperature: 0.2
  top_p: 1.0
  max_tokens: 512
  timeout_seconds: 120
  retries: 2

judge:
  enabled: true
  model: "gpt-oss:20b"
  use_chat_api: false
  rubric_prompt: |
    You are a strict clinical evaluator.
    Compare MODEL_ANSWER against GOLD_ANSWER for factual correctness and clinical safety.
    Score from 0 to 1, where 1 means fully correct.
    Return exactly: score=<float> rationale=<short rationale>

output:
  output_dir: "outputs"
  log_subdir: "logs"
  save_parquet: true
  save_csv: true
  save_jsonl: true
