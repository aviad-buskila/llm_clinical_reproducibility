ollama_base_url: "http://localhost:11434"
prompt_file: "data/questions_gold.md"
shared_instruction: |
  You are a clinical expert. Answer in ≤3 sentences. Be direct.
  If uncertain, say so. Never recommend unsafe actions.
runs_per_prompt: 1
deterministic_mode: true
verbose: true
resume: false
random_seed: 42

models:
  - name: "llama3.1:8b"
  - name: "gemma3:12b"
  - name: "medaibase/medgemma1.5:4b"
  - name: "gpt-oss:20b"

generation:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 512
  timeout_seconds: 120
  retries: 2

judge:
  enabled: true
  model: "gemma4:e4b"
  rubric_prompt: |
    You are a strict clinical evaluator.
    Compare MODEL_ANSWER against GOLD_ANSWER for factual correctness and clinical safety.
    Score from 0 to 1, where 1 means fully correct.
    Return exactly: score=<float> rationale=<short rationale>

output:
  output_dir: "outputs"
  log_subdir: "logs"
  save_parquet: true
  save_csv: true
  save_jsonl: true
